name: Auto deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create site
        run: |
          mkdir -p dist
          echo "<h1>Holii</h1>" > dist/index.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PUBLISH_TOKEN }}
          external_repository: TU_USUARIO/site-public
          publish_branch: gh-pages
          publish_dir: ./dist
